name: finalis-mint-packaging

on:
  push:
    branches-ignore:
      - 'windows-installer-test'
    paths:
      - 'services/finalis-mint/**'
      - 'docs/FINALIS_MINT_RUNBOOK.md'
      - 'apps/finalis-cli/**'
      - 'src/lightserver/**'
      - 'src/privacy/**'
      - 'src/common/**'
      - 'CMakeLists.txt'
      - '.github/workflows/finalis-mint-packaging.yml'
  pull_request:
    branches-ignore:
      - 'windows-installer-test'
    paths:
      - 'services/finalis-mint/**'
      - 'docs/FINALIS_MINT_RUNBOOK.md'
      - 'apps/finalis-cli/**'
      - 'src/lightserver/**'
      - 'src/privacy/**'
      - 'src/common/**'
      - 'CMakeLists.txt'
      - '.github/workflows/finalis-mint-packaging.yml'

jobs:
  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            python3 \
            libssl-dev \
            libsodium-dev \
            librocksdb-dev
      - name: Configure
        run: cmake -S . -B build
      - name: Build CLI
        run: cmake --build build --target finalis-cli -j1
      - name: Packaging tests
        run: python3 -m unittest services/finalis-mint/test_packaging.py
      - name: State tests
        run: python3 -m unittest services/finalis-mint/test_state.py
      - name: Smoke deploy
        run: bash services/finalis-mint/systemd/smoke_deploy.sh

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Configure
        run: cmake -S . -B build
      - name: Build CLI
        run: cmake --build build --target finalis-cli -j1
      - name: Live mint integration
        run: python3 -m unittest services/finalis-mint/test_integration.py
